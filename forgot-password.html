<div class="card">
<h1>Reset your password</h1>
<p>Enter your email and we’ll send you a password reset link.</p>
<form id="resetForm">
<label for="email">Email address</label>
<input autocomplete="email" id="email" placeholder="you@example.com" required="" type="email"/>
<button data-action="reset-tool" id="btn" type="submit">Send reset link</button>
<div aria-live="polite" class="status" id="status" role="status"></div>
</form>
<div class="links">
<a href="sign-in.html">Back to Sign In</a>
</div>
</div>
