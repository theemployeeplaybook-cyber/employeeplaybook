<head>
  <meta charset="utf-8" />

  <title>Update Password | The Employee Playbook</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<body data-page="auth" data-protected="false">
  <a class="skip-link" href="#main">Skip to content</a>
  <div data-shared-header></div>
  <main id="main" class="page-shell auth-page">
<div class="card">
<h1>Set your new password</h1>
<p>Enter your new password below. Make sure it's secure.</p>
<form id="updateForm">
<label for="password">New Password</label>
<input autocomplete="new-password" id="password" minlength="8" placeholder="Enter new password" required="" type="password"/>
<div class="strength-meter"><div class="strength-meter-bar" id="strengthBar"></div></div>
<p class="password-hint">Minimum 8 characters. Use a mix of letters, numbers &amp; symbols.</p>
<label for="confirm">Confirm Password</label>
<input autocomplete="new-password" id="confirm" placeholder="Confirm new password" required="" type="password"/>
<button id="btn" type="submit">Update Password</button>
<div aria-live="polite" class="status" id="status" role="status"></div>
</form>
<div class="links">
<a href="sign-in.html">Back to Sign In</a>
</div>
</div>
  </main>
  <div data-shared-footer></div>
</body>
</html>
